<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>HandCam – Accessible Remote</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

:root {
–bg: #0a0a12;
–surface: #12121e;
–tile-bg: #1a1a2e;
–tile-hover: #252545;
–accent: #7c6aff;
–accent2: #ff6a9e;
–green: #4fffb0;
–text: #f0eeff;
–muted: #7870aa;
–cursor-color: #7c6aff;
–ring-color: #4fffb0;
}

body {
background: var(–bg);
color: var(–text);
font-family: ‘Segoe UI’, system-ui, sans-serif;
overflow: hidden;
width: 100vw;
height: 100vh;
display: flex;
flex-direction: column;
}

/* ── PERMISSION SCREEN ── */
#permission-screen {
position: fixed; inset: 0;
display: flex; flex-direction: column;
align-items: center; justify-content: center;
gap: 32px; z-index: 1000;
background: var(–bg);
padding: 32px;
text-align: center;
}
#permission-screen h1 { font-size: clamp(2rem, 6vw, 4rem); font-weight: 800; color: var(–text); }
#permission-screen p { font-size: clamp(1rem, 3vw, 1.6rem); color: var(–muted); max-width: 600px; line-height: 1.6; }
#start-btn {
font-size: clamp(1.2rem, 4vw, 2rem);
padding: 24px 56px;
border: none; border-radius: 24px;
background: var(–accent);
color: white; cursor: pointer; font-weight: 700;
transition: transform .15s, box-shadow .15s;
box-shadow: 0 0 40px rgba(124,106,255,.5);
}
#start-btn:hover { transform: scale(1.05); box-shadow: 0 0 60px rgba(124,106,255,.8); }

/* ── STATUS BAR ── */
#status-bar {
display: none;
padding: 8px 20px;
background: var(–surface);
border-bottom: 1px solid rgba(255,255,255,.06);
font-size: .85rem; color: var(–muted);
display: flex; align-items: center; gap: 16px;
min-height: 40px; flex-shrink: 0;
}
#status-bar.hidden { display: none !important; }
.status-dot {
width: 10px; height: 10px; border-radius: 50%;
background: #333; flex-shrink: 0;
transition: background .3s;
}
.status-dot.active { background: var(–green); box-shadow: 0 0 8px var(–green); }
.status-dot.warning { background: #ffb84f; }
#mic-btn {
margin-left: auto;
background: none; border: 1px solid rgba(255,255,255,.15);
color: var(–muted); padding: 4px 14px; border-radius: 20px;
cursor: pointer; font-size: .8rem; transition: all .2s;
}
#mic-btn.active { border-color: var(–accent2); color: var(–accent2); }
#preview-btn {
background: none; border: 1px solid rgba(255,255,255,.15);
color: var(–muted); padding: 4px 14px; border-radius: 20px;
cursor: pointer; font-size: .8rem; transition: all .2s;
}
#preview-btn.active { border-color: var(–accent); color: var(–accent); }

/* ── MAIN CANVAS AREA ── */
#main {
position: relative; flex: 1; overflow: hidden;
display: none;
}
#main.visible { display: block; }

/* Camera feed (hidden – we process it) */
#cam-video {
position: absolute; top: -9999px; left: -9999px;
width: 320px; height: 240px;
}

/* Live canvas – full area */
#ui-canvas {
position: absolute; inset: 0;
width: 100%; height: 100%;
touch-action: none;
}

/* Camera preview PiP */
#cam-preview {
position: absolute;
top: 16px; left: 16px;
width: 200px; height: 150px;
border-radius: 12px;
overflow: hidden;
border: 2px solid rgba(124,106,255,.5);
box-shadow: 0 4px 24px rgba(0,0,0,.6);
z-index: 50;
display: none;
}
#cam-preview.visible { display: block; }
#cam-preview canvas {
width: 100%; height: 100%;
transform: scaleX(-1); /* mirror */
}

/* Sound flash overlay */
#sound-flash {
position: absolute; inset: 0; pointer-events: none;
background: rgba(79,255,176,.12);
opacity: 0; z-index: 60;
transition: opacity .1s;
}

/* Loading overlay */
#loading {
position: absolute; inset: 0;
background: var(–bg);
display: flex; flex-direction: column;
align-items: center; justify-content: center;
gap: 20px; z-index: 90;
}
#loading.hidden { display: none; }
.spinner {
width: 56px; height: 56px;
border: 4px solid rgba(124,106,255,.2);
border-top-color: var(–accent);
border-radius: 50%;
animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#load-msg { color: var(–muted); font-size: 1.1rem; }

/* Debug panel */
#debug {
position: fixed; bottom: 0; left: 0; right: 0;
background: rgba(0,0,0,.88);
color: #4fffb0; font-family: monospace; font-size: 13px;
padding: 8px 12px; z-index: 200;
max-height: 180px; overflow-y: auto;
display: none; border-top: 1px solid #333;
}
#debug.visible { display: block; }
#debug-toggle {
position: fixed; bottom: 8px; right: 8px;
background: rgba(0,0,0,.7); color: #aaa;
border: 1px solid #444; border-radius: 6px;
padding: 6px 12px; font-size: 12px; cursor: pointer;
z-index: 201; touch-action: manipulation;
}
</style>

</head>
<body>

<!-- DEBUG PANEL -->

<div id="debug"></div>
<button id="debug-toggle">🐛 Debug</button>

<!-- PERMISSION SCREEN -->

<div id="permission-screen">
  <h1>👋 HandCam</h1>
  <p>Move your hand in front of the camera to control the cursor.<br>Hover over a tile to select it — or make a sound!</p>
  <button id="start-btn">Tap to Start</button>
</div>

<!-- STATUS BAR -->

<div id="status-bar" class="hidden">
  <div class="status-dot" id="cam-dot" title="Camera"></div>
  <span id="cam-label">Camera</span>
  <div class="status-dot" id="hand-dot" title="Hand"></div>
  <span id="hand-label">Hand: looking…</span>
  <div class="status-dot" id="mic-dot" title="Mic" style="margin-left:8px"></div>
  <button id="mic-btn">🎤 Mic OFF</button>
  <button id="preview-btn">📷 Preview</button>
</div>

<!-- MAIN APP -->

<div id="main">
  <canvas id="ui-canvas"></canvas>
  <video id="cam-video" playsinline autoplay muted></video>

  <!-- PiP camera preview -->

  <div id="cam-preview">
    <canvas id="preview-canvas"></canvas>
  </div>

  <!-- Sound flash -->

  <div id="sound-flash"></div>

  <!-- Loading overlay -->

  <div id="loading">
    <div class="spinner"></div>
    <div id="load-msg">Loading hand tracker…</div>
  </div>
</div>

<!-- MediaPipe -->

<script src="https://unpkg.com/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>

<script src="https://unpkg.com/@mediapipe/camera_utils@0.3.1632090399/camera_utils.js" crossorigin="anonymous"></script>

<script>
// ═══════════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════════
const CFG = {
  dwellMs: 2000,         // ms to hover before selecting
  sensitivity: 1.8,      // cursor amplification
  smoothing: 0.18,       // 0=max smooth, 1=raw
  cursorRadius: 36,
  soundThreshold: 0.18,  // RMS threshold
  soundCooldownMs: 800,
  previewOn: false,
  micOn: false,
};

// ═══════════════════════════════════════════════════════════
//  DEBUG LOGGING
// ═══════════════════════════════════════════════════════════
const debugEl = document.getElementById('debug');
const debugToggle = document.getElementById('debug-toggle');
debugToggle.addEventListener('click', () => debugEl.classList.toggle('visible'));

function dbg(msg, color) {
  const line = document.createElement('div');
  const t = new Date().toLocaleTimeString('en',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
  line.style.color = color || '#4fffb0';
  line.textContent = `[${t}] ${msg}`;
  debugEl.appendChild(line);
  debugEl.scrollTop = debugEl.scrollHeight;
  // Keep max 40 lines
  while (debugEl.children.length > 40) debugEl.removeChild(debugEl.firstChild);
}
function dbgErr(msg) { dbg('❌ ' + msg, '#ff6a6a'); }
function dbgWarn(msg) { dbg('⚠️ ' + msg, '#ffb84f'); }
function dbgOk(msg) { dbg('✓ ' + msg, '#4fffb0'); }

// Override console.error/warn to also show in panel
const _ce = console.error.bind(console);
console.error = (...a) => { _ce(...a); dbgErr(a.join(' ')); };
const _cw = console.warn.bind(console);
console.warn = (...a) => { _cw(...a); dbgWarn(a.join(' ')); };


const state = {
  cx: 0.5, cy: 0.5,       // raw hand pos (0–1)
  sx: 0.5, sy: 0.5,       // smoothed cursor pos (0–1)
  handVisible: false,
  hoveredTile: null,
  dwellStart: null,
  dwellProgress: 0,
  soundFlash: 0,
  lastSoundTime: 0,
  micStream: null,
  audioCtx: null,
  analyser: null,
  lastSelected: null,
  screen: 'home',         // 'home' | 'settings' | 'video'
  videoSrc: null,
};

// ═══════════════════════════════════════════════════════════
//  DOM REFS
// ═══════════════════════════════════════════════════════════
const permScreen = document.getElementById('permission-screen');
const startBtn   = document.getElementById('start-btn');
const statusBar  = document.getElementById('status-bar');
const mainDiv    = document.getElementById('main');
const canvas     = document.getElementById('ui-canvas');
const ctx        = canvas.getContext('2d');
const camVideo   = document.getElementById('cam-video');
const camPreview = document.getElementById('cam-preview');
const prevCanvas = document.getElementById('preview-canvas');
const prevCtx    = prevCanvas.getContext('2d');
const loadDiv    = document.getElementById('loading');
const loadMsg    = document.getElementById('load-msg');
const soundFlash = document.getElementById('sound-flash');
const camDot     = document.getElementById('cam-dot');
const handDot    = document.getElementById('hand-dot');
const micDot     = document.getElementById('mic-dot');
const micBtn     = document.getElementById('mic-btn');
const previewBtn = document.getElementById('preview-btn');

// ═══════════════════════════════════════════════════════════
//  TILE DEFINITIONS
// ═══════════════════════════════════════════════════════════
function getTiles() {
  const W = canvas.width, H = canvas.height;
  const pad = 24, cols = 3, rows = 2;
  const tileW = (W - pad * (cols + 1)) / cols;
  const tileH = (H - pad * (rows + 1)) / rows;

  const labels = [
    { id: 'vid1', label: '🎬 Video 1',   color: '#7c6aff', action: 'video', src: null },
    { id: 'vid2', label: '🎮 Video 2',   color: '#ff6a9e', action: 'video', src: null },
    { id: 'vid3', label: '🌟 Video 3',   color: '#ffa86a', action: 'video', src: null },
    { id: 'vid4', label: '🎵 Video 4',   color: '#4fffb0', action: 'video', src: null },
    { id: 'vid5', label: '🐾 Video 5',   color: '#6afffa', action: 'video', src: null },
    { id: 'settings', label: '⚙️ Settings', color: '#aaaacc', action: 'settings', src: null },
  ];

  return labels.map((l, i) => {
    const col = i % cols, row = Math.floor(i / cols);
    return {
      ...l,
      x: pad + col * (tileW + pad),
      y: pad + row * (tileH + pad),
      w: tileW, h: tileH,
    };
  });
}

function getSettingsTiles() {
  const W = canvas.width, H = canvas.height;
  const pad = 24;
  const tileW = (W - pad * 3) / 2;
  const tileH = 90;
  return [
    { id: 'dwell+', label: `⏱ Dwell: ${(CFG.dwellMs/1000).toFixed(1)}s  ▲`, x: pad, y: pad, w: tileW, h: tileH, action: 'dwell+', color: '#7c6aff' },
    { id: 'dwell-', label: `⏱ Dwell: ${(CFG.dwellMs/1000).toFixed(1)}s  ▼`, x: pad*2+tileW, y: pad, w: tileW, h: tileH, action: 'dwell-', color: '#7c6aff' },
    { id: 'sens+',  label: `🎯 Sensitivity ▲`, x: pad, y: pad*2+tileH, w: tileW, h: tileH, action: 'sens+', color: '#ff6a9e' },
    { id: 'sens-',  label: `🎯 Sensitivity ▼`, x: pad*2+tileW, y: pad*2+tileH, w: tileW, h: tileH, action: 'sens-', color: '#ff6a9e' },
    { id: 'mic',    label: CFG.micOn ? '🎤 Mic: ON' : '🎤 Mic: OFF', x: pad, y: pad*3+tileH*2, w: tileW, h: tileH, action: 'mic', color: '#4fffb0' },
    { id: 'preview', label: CFG.previewOn ? '📷 Preview: ON' : '📷 Preview: OFF', x: pad*2+tileW, y: pad*3+tileH*2, w: tileW, h: tileH, action: 'preview', color: '#6afffa' },
    { id: 'back',   label: '← Back', x: pad, y: pad*4+tileH*3, w: tileW*2+pad, h: tileH, action: 'back', color: '#aaaacc' },
  ];
}

// ═══════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════
function resize() {
  canvas.width  = mainDiv.offsetWidth;
  canvas.height = mainDiv.offsetHeight;
  prevCanvas.width  = 200;
  prevCanvas.height = 150;
}

function drawRoundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, r);
}

function render(ts) {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(0, 0, W, H);

  // Subtle grid
  ctx.strokeStyle = 'rgba(124,106,255,.04)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 60) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += 60) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  // Current screen
  const tiles = state.screen === 'settings' ? getSettingsTiles() : getTiles();

  // ── TILES ──
  for (const tile of tiles) {
    const isHover = state.hoveredTile === tile.id;

    // Shadow glow on hover
    if (isHover) {
      ctx.save();
      ctx.shadowColor = tile.color;
      ctx.shadowBlur = 32;
      ctx.fillStyle = tile.color + '22';
      drawRoundRect(tile.x, tile.y, tile.w, tile.h, 20);
      ctx.fill();
      ctx.restore();
    }

    // Tile body
    ctx.save();
    const grad = ctx.createLinearGradient(tile.x, tile.y, tile.x + tile.w, tile.y + tile.h);
    grad.addColorStop(0, isHover ? '#22223a' : '#15152a');
    grad.addColorStop(1, isHover ? '#1a1a35' : '#0f0f20');
    ctx.fillStyle = grad;
    drawRoundRect(tile.x, tile.y, tile.w, tile.h, 20);
    ctx.fill();

    // Border
    ctx.strokeStyle = isHover ? tile.color + 'aa' : 'rgba(255,255,255,.08)';
    ctx.lineWidth = isHover ? 2.5 : 1.5;
    drawRoundRect(tile.x, tile.y, tile.w, tile.h, 20);
    ctx.stroke();
    ctx.restore();

    // Label
    const fontSize = Math.min(tile.w / 7, tile.h / 3, 28);
    ctx.save();
    ctx.fillStyle = isHover ? '#fff' : '#c8c0f0';
    ctx.font = `${isHover ? 700 : 600} ${fontSize}px 'Segoe UI', system-ui, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(tile.label, tile.x + tile.w / 2, tile.y + tile.h / 2);
    ctx.restore();

    // Dwell progress ring
    if (isHover && state.dwellProgress > 0) {
      const cx2 = tile.x + tile.w - 28, cy2 = tile.y + 28;
      const r = 18;
      ctx.save();
      ctx.strokeStyle = 'rgba(255,255,255,.15)';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.arc(cx2, cy2, r, 0, Math.PI * 2);
      ctx.stroke();

      ctx.strokeStyle = '#4fffb0';
      ctx.lineWidth = 4;
      ctx.lineCap = 'round';
      ctx.shadowColor = '#4fffb0';
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.arc(cx2, cy2, r, -Math.PI/2, -Math.PI/2 + Math.PI*2*state.dwellProgress);
      ctx.stroke();
      ctx.restore();
    }
  }

  // ── CURSOR ──
  const cx2 = state.sx * W;
  const cy2 = state.sy * H;
  const R = CFG.cursorRadius;

  if (state.handVisible) {
    // Outer glow
    ctx.save();
    ctx.shadowColor = '#7c6aff';
    ctx.shadowBlur = 40;
    ctx.beginPath();
    ctx.arc(cx2, cy2, R, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(124,106,255,.6)';
    ctx.lineWidth = 3;
    ctx.stroke();
    ctx.restore();

    // Inner fill
    ctx.save();
    const cg = ctx.createRadialGradient(cx2-R*.3, cy2-R*.3, 0, cx2, cy2, R);
    cg.addColorStop(0, 'rgba(160,140,255,.9)');
    cg.addColorStop(1, 'rgba(100,80,220,.5)');
    ctx.fillStyle = cg;
    ctx.beginPath();
    ctx.arc(cx2, cy2, R*.65, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    // Center dot
    ctx.save();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(cx2, cy2, 5, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  } else {
    // Ghost cursor (no hand)
    ctx.save();
    ctx.strokeStyle = 'rgba(124,106,255,.2)';
    ctx.lineWidth = 2;
    ctx.setLineDash([6,6]);
    ctx.beginPath();
    ctx.arc(cx2, cy2, R, 0, Math.PI*2);
    ctx.stroke();
    ctx.restore();
  }

  // ── NO HAND MESSAGE ──
  if (!state.handVisible) {
    ctx.save();
    ctx.fillStyle = 'rgba(120,112,170,.5)';
    ctx.font = '500 20px Segoe UI, system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText('✋ Show your right hand to the camera', W/2, H - 20);
    ctx.restore();
  }

  // ── CAMERA PREVIEW ──
  if (CFG.previewOn && camVideo.readyState >= 2) {
    prevCtx.save();
    prevCtx.scale(-1, 1);
    prevCtx.drawImage(camVideo, -200, 0, 200, 150);
    prevCtx.restore();
  }

  // Update dwell
  updateDwell(ts, tiles);

  requestAnimationFrame(render);
}

// ═══════════════════════════════════════════════════════════
//  DWELL LOGIC
// ═══════════════════════════════════════════════════════════
let dwellRafId = null;

function updateDwell(ts, tiles) {
  const W = canvas.width, H = canvas.height;
  const curX = state.sx * W, curY = state.sy * H;

  let hitTile = null;
  for (const tile of tiles) {
    if (curX >= tile.x && curX <= tile.x + tile.w &&
        curY >= tile.y && curY <= tile.y + tile.h) {
      hitTile = tile;
      break;
    }
  }

  if (hitTile && state.handVisible) {
    if (state.hoveredTile !== hitTile.id) {
      state.hoveredTile = hitTile.id;
      state.dwellStart = ts;
      state.dwellProgress = 0;
    } else {
      const elapsed = ts - state.dwellStart;
      state.dwellProgress = Math.min(elapsed / CFG.dwellMs, 1);
      if (state.dwellProgress >= 1) {
        selectTile(hitTile);
        state.dwellStart = ts + 800; // cooldown
        state.dwellProgress = 0;
      }
    }
  } else {
    state.hoveredTile = null;
    state.dwellStart = null;
    state.dwellProgress = 0;
  }
}

function selectTile(tile) {
  // Flash
  soundFlash.style.opacity = '1';
  soundFlash.style.background = `${tile.color}22`;
  setTimeout(() => { soundFlash.style.opacity = '0'; }, 200);

  if (tile.action === 'back') {
    state.screen = 'home';
  } else if (tile.action === 'settings') {
    state.screen = 'settings';
  } else if (tile.action === 'video') {
    // Placeholder – in production, open a video player
    flashMessage(`▶ ${tile.label} selected!`);
  } else if (tile.action === 'dwell+') {
    CFG.dwellMs = Math.min(4000, CFG.dwellMs + 250);
  } else if (tile.action === 'dwell-') {
    CFG.dwellMs = Math.max(500, CFG.dwellMs - 250);
  } else if (tile.action === 'sens+') {
    CFG.sensitivity = Math.min(4, +(CFG.sensitivity + 0.2).toFixed(1));
  } else if (tile.action === 'sens-') {
    CFG.sensitivity = Math.max(0.5, +(CFG.sensitivity - 0.2).toFixed(1));
  } else if (tile.action === 'mic') {
    toggleMic();
  } else if (tile.action === 'preview') {
    togglePreview();
  }
}

let flashTimer = null;
function flashMessage(msg) {
  const el = document.createElement('div');
  el.style.cssText = `
    position:fixed; bottom:80px; left:50%; transform:translateX(-50%);
    background:rgba(124,106,255,.9); color:#fff; padding:16px 36px;
    border-radius:40px; font-size:1.4rem; font-weight:700; z-index:200;
    pointer-events:none; white-space:nowrap;
    animation: fadeUp .3s ease forwards;
  `;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2000);
}

// ═══════════════════════════════════════════════════════════
//  MEDIAPIPE HANDS
// ═══════════════════════════════════════════════════════════
let mpHands = null;

async function initHandTracking() {
  loadMsg.textContent = 'Loading MediaPipe Hands…';
  dbg('Loading MediaPipe Hands…');

  mpHands = new Hands({
    locateFile: (file) => `https://unpkg.com/@mediapipe/hands@0.4.1646424915/${file}`
  });

  mpHands.setOptions({
    maxNumHands: 1,
    modelComplexity: 0,      // fast
    minDetectionConfidence: 0.6,
    minTrackingConfidence: 0.5,
  });

  mpHands.onResults(onHandResults);

  try {
    await mpHands.initialize();
    dbgOk('MediaPipe initialized');
  } catch(e) {
    loadMsg.textContent = 'Hand tracker failed – using mouse fallback';
    dbgErr('MediaPipe init failed: ' + e.message);
    console.warn('MediaPipe init failed:', e);
    loadDiv.classList.add('hidden');
    enableMouseFallback();
    return;
  }

  loadMsg.textContent = 'Starting camera…';
  await startCamera();
}

function onHandResults(results) {
  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    const lm = results.multiHandLandmarks[0];
    const palmX = (lm[0].x + lm[9].x) / 2;
    const palmY = (lm[0].y + lm[9].y) / 2;
    if (!state.handVisible) dbgOk(`Hand detected — palm (${palmX.toFixed(2)}, ${palmY.toFixed(2)})`);
    const offsetX = (palmX - 0.5) * CFG.sensitivity;
    const offsetY = (palmY - 0.5) * CFG.sensitivity;

    // Invert X so moving hand right → cursor right (mirror compensation)
    state.cx = 0.5 - offsetX;
    state.cy = 0.5 + offsetY;

    state.handVisible = true;
    handDot.className = 'status-dot active';
    document.getElementById('hand-label').textContent = 'Hand: detected ✓';
  } else {
    state.handVisible = false;
    handDot.className = 'status-dot warning';
    document.getElementById('hand-label').textContent = 'Hand: not found';
  }

  // Smooth cursor
  state.sx += (state.cx - state.sx) * CFG.smoothing;
  state.sy += (state.cy - state.sy) * CFG.smoothing;
  state.sx = Math.max(0.02, Math.min(0.98, state.sx));
  state.sy = Math.max(0.02, Math.min(0.98, state.sy));
}

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
      audio: false,
    });
    camVideo.srcObject = stream;
    await new Promise(res => camVideo.onloadedmetadata = res);
    camVideo.play();
    dbgOk('Camera stream started');
    camDot.className = 'status-dot active';
    document.getElementById('cam-label').textContent = 'Camera: on ✓';

    // Start MP camera loop
    const camera = new Camera(camVideo, {
      onFrame: async () => {
        if (mpHands) await mpHands.send({ image: camVideo });
      },
      width: 640, height: 480,
    });
    camera.start();

    loadDiv.classList.add('hidden');
  } catch(e) {
    dbgErr('Camera error: ' + e.name + ' – ' + e.message);
    console.error('Camera error:', e);
    loadMsg.textContent = 'Camera denied – using mouse fallback';
    setTimeout(() => loadDiv.classList.add('hidden'), 2000);
    enableMouseFallback();
  }
}

// ═══════════════════════════════════════════════════════════
//  MOUSE FALLBACK (for desktop testing)
// ═══════════════════════════════════════════════════════════
function enableMouseFallback() {
  canvas.addEventListener('mousemove', e => {
    const r = canvas.getBoundingClientRect();
    state.cx = (e.clientX - r.left) / r.width;
    state.cy = (e.clientY - r.top) / r.height;
    state.sx = state.cx;
    state.sy = state.cy;
    state.handVisible = true;
  });
  handDot.className = 'status-dot active';
  document.getElementById('hand-label').textContent = 'Mouse fallback';
}

// ═══════════════════════════════════════════════════════════
//  MICROPHONE / SOUND DETECTION
// ═══════════════════════════════════════════════════════════
async function toggleMic() {
  if (!CFG.micOn) {
    try {
      const micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const src = state.audioCtx.createMediaStreamSource(micStream);
      state.analyser = state.audioCtx.createAnalyser();
      state.analyser.fftSize = 256;
      src.connect(state.analyser);
      state.micStream = micStream;
      CFG.micOn = true;
      micDot.className = 'status-dot active';
      micBtn.classList.add('active');
      micBtn.textContent = '🎤 Mic ON';
      startSoundLoop();
    } catch(e) {
      flashMessage('Mic permission denied');
    }
  } else {
    if (state.micStream) state.micStream.getTracks().forEach(t => t.stop());
    if (state.audioCtx) state.audioCtx.close();
    state.analyser = null;
    CFG.micOn = false;
    micDot.className = 'status-dot';
    micBtn.classList.remove('active');
    micBtn.textContent = '🎤 Mic OFF';
  }
}

function startSoundLoop() {
  const buf = new Float32Array(128);
  function loop() {
    if (!CFG.micOn || !state.analyser) return;
    state.analyser.getFloatTimeDomainData(buf);
    let rms = 0;
    for (const v of buf) rms += v * v;
    rms = Math.sqrt(rms / buf.length);

    if (rms > CFG.soundThreshold) {
      const now = performance.now();
      if (now - state.lastSoundTime > CFG.soundCooldownMs) {
        state.lastSoundTime = now;
        onSound();
      }
    }
    requestAnimationFrame(loop);
  }
  loop();
}

function onSound() {
  // Flash green
  soundFlash.style.background = 'rgba(79,255,176,.15)';
  soundFlash.style.opacity = '1';
  setTimeout(() => { soundFlash.style.opacity = '0'; }, 150);

  // If hovering a tile, select it immediately
  if (state.hoveredTile) {
    const tiles = state.screen === 'settings' ? getSettingsTiles() : getTiles();
    const tile = tiles.find(t => t.id === state.hoveredTile);
    if (tile) selectTile(tile);
  }
}

// ═══════════════════════════════════════════════════════════
//  PREVIEW TOGGLE
// ═══════════════════════════════════════════════════════════
function togglePreview() {
  CFG.previewOn = !CFG.previewOn;
  camPreview.classList.toggle('visible', CFG.previewOn);
  previewBtn.classList.toggle('active', CFG.previewOn);
  previewBtn.textContent = CFG.previewOn ? '📷 Preview ON' : '📷 Preview';
}

// ═══════════════════════════════════════════════════════════
//  STARTUP
// ═══════════════════════════════════════════════════════════
startBtn.addEventListener('click', async () => {
  permScreen.style.display = 'none';
  statusBar.classList.remove('hidden');
  mainDiv.classList.add('visible');

  resize();
  window.addEventListener('resize', resize);
  dbgOk('App started');
  requestAnimationFrame(render);
  await initHandTracking();
});

micBtn.addEventListener('click', toggleMic);
previewBtn.addEventListener('click', togglePreview);

// Keyboard shortcut: Space = sound trigger (for testing)
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); onSound(); }
});
</script>

@keyframes fadeUp {
  from { opacity: 0; transform: translateX(-50%) translateY(20px); }
  to   { opacity: 1; transform: translateX(-50%) translateY(0); }
}
</style>

<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HandCam">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a12">
<link rel="manifest" href="manifest.json">
<title>HandCam</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#0a0a12; --surface:#12121e;
  --accent:#7c6aff; --green:#4fffb0; --text:#f0eeff; --muted:#7870aa;
}
html,body { width:100%; height:100%; overflow:hidden; background:var(--bg); color:var(--text);
  font-family:'Segoe UI',system-ui,sans-serif; -webkit-user-select:none; user-select:none; }

#permission-screen {
position:fixed; inset:0; display:flex; flex-direction:column;
align-items:center; justify-content:center; gap:28px;
background:var(–bg); z-index:1000; padding:32px; text-align:center; }
#permission-screen h1 { font-size:clamp(2rem,8vw,4rem); font-weight:900; }
#permission-screen p  { font-size:clamp(1rem,3.5vw,1.4rem); color:var(–muted); max-width:480px; line-height:1.6; }
#start-btn { font-size:clamp(1.2rem,5vw,2rem); padding:22px 52px; border:none; border-radius:24px;
background:var(–accent); color:#fff; cursor:pointer; font-weight:800;
box-shadow:0 0 40px rgba(124,106,255,.5); touch-action:manipulation; }

#status-bar { display:none; padding:5px 14px; background:var(–surface);
border-bottom:1px solid rgba(255,255,255,.06); font-size:.78rem; color:var(–muted);
align-items:center; gap:10px; min-height:36px; flex-shrink:0; }
#status-bar.show { display:flex; }
.sdot { width:8px; height:8px; border-radius:50%; background:#333; flex-shrink:0; transition:background .3s; }
.sdot.ok   { background:var(–green); box-shadow:0 0 5px var(–green); }
.sdot.warn { background:#ffb84f; }
.sbar-btn { background:none; border:1px solid rgba(255,255,255,.14); color:var(–muted);
padding:3px 11px; border-radius:20px; cursor:pointer; font-size:.73rem; touch-action:manipulation; }
.sbar-btn.on { border-color:var(–accent); color:var(–accent); }
#sbar-right { margin-left:auto; display:flex; gap:7px; align-items:center; }

#main { position:relative; overflow:hidden; display:none; width:100%;
height:calc(100vh - 36px); }
#main.show { display:block; }
#ui-canvas { position:absolute; inset:0; width:100%; height:100%; touch-action:none; }
#cam-video { position:absolute; top:-9999px; left:-9999px; width:320px; height:240px; }

#cam-preview { position:absolute; top:10px; left:10px; width:170px; height:128px;
border-radius:10px; overflow:hidden; border:2px solid rgba(124,106,255,.5);
box-shadow:0 4px 20px rgba(0,0,0,.6); z-index:50; display:none; }
#cam-preview.show { display:block; }
#preview-canvas { width:100%; height:100%; transform:scaleX(-1); }

#sound-flash { position:absolute; inset:0; pointer-events:none;
background:rgba(79,255,176,.12); opacity:0; z-index:60; transition:opacity .1s; }

#loading { position:absolute; inset:0; background:var(–bg); display:flex; flex-direction:column;
align-items:center; justify-content:center; gap:18px; z-index:90; }
#loading.gone { display:none; }
.spinner { width:48px; height:48px; border:4px solid rgba(124,106,255,.2);
border-top-color:var(–accent); border-radius:50%; animation:spin 1s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
#load-msg { color:var(–muted); font-size:.95rem; }

#video-overlay { position:fixed; inset:0; background:#000; z-index:500;
display:none; align-items:center; justify-content:center; }
#video-overlay.show { display:flex; }
#full-video { width:100%; height:100%; object-fit:contain; background:#000; }
#close-video { position:absolute; top:18px; right:18px; width:52px; height:52px;
border-radius:50%; background:rgba(0,0,0,.75); border:2px solid rgba(255,255,255,.3);
color:#fff; font-size:1.3rem; cursor:pointer; display:flex; align-items:center;
justify-content:center; z-index:10; touch-action:manipulation; }

#debug { position:fixed; bottom:0; left:0; right:0; background:rgba(0,0,0,.9);
color:var(–green); font-family:monospace; font-size:12px; padding:7px 11px;
z-index:200; max-height:150px; overflow-y:auto; display:none; border-top:1px solid #333; }
#debug.show { display:block; }
#debug-toggle { position:fixed; bottom:7px; right:7px; background:rgba(0,0,0,.7);
color:#777; border:1px solid #444; border-radius:6px; padding:4px 9px;
font-size:11px; cursor:pointer; z-index:201; touch-action:manipulation; }

@keyframes fadeUp {
from{opacity:0;transform:translateX(-50%) translateY(14px);}
to{opacity:1;transform:translateX(-50%) translateY(0);}
}
</style>

</head>
<body>

<div id="debug"></div>
<button id="debug-toggle">🐛</button>

<div id="permission-screen">
  <h1>👋 HandCam</h1>
  <p>Move your hand in front of the camera to control the cursor.<br>Hover a tile to select it.</p>
  <button id="start-btn">Tap to Start</button>
</div>

<div id="status-bar">
  <div class="sdot" id="cam-dot"></div><span id="cam-lbl">Camera</span>
  <div class="sdot" id="hand-dot"></div><span id="hand-lbl">Hand</span>
  <div id="sbar-right">
    <div class="sdot" id="mic-dot"></div>
    <button class="sbar-btn" id="mic-btn">🎤 Mic</button>
    <button class="sbar-btn" id="preview-btn">📷</button>
  </div>
</div>

<div id="main">
  <canvas id="ui-canvas"></canvas>
  <video id="cam-video" playsinline autoplay muted></video>
  <div id="cam-preview"><canvas id="preview-canvas"></canvas></div>
  <div id="sound-flash"></div>
  <div id="loading"><div class="spinner"></div><div id="load-msg">Loading…</div></div>
</div>

<div id="video-overlay">
  <video id="full-video" playsinline></video>
  <button id="close-video">✕</button>
</div>

<script src="https://unpkg.com/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>

<script>
'use strict';

// ── CONFIG ──────────────────────────────────────────────────
const CFG = {
  dwellMs:2000, sensitivity:1.8, smoothing:0.18, cursorRadius:38,
  soundThreshold:0.18, soundCooldownMs:800,
  previewOn:false, micOn:false,
  cols:2, tileH:200, tilePad:18,
  scrollZone:0.14,   // top/bottom fraction that triggers scroll
  scrollSpeed:5,
};

// ── DEBUG ────────────────────────────────────────────────────
const debugEl = document.getElementById('debug');
document.getElementById('debug-toggle').addEventListener('click',()=>debugEl.classList.toggle('show'));
function dbg(m,c){const d=document.createElement('div'),t=new Date().toLocaleTimeString('en',{hour12:false});d.style.color=c||'#4fffb0';d.textContent=`[${t}] ${m}`;debugEl.appendChild(d);debugEl.scrollTop=debugEl.scrollHeight;while(debugEl.children.length>50)debugEl.removeChild(debugEl.firstChild);}
function dbgOk(m){dbg('✓ '+m,'#4fffb0');}function dbgErr(m){dbg('❌ '+m,'#ff6a6a');}function dbgWarn(m){dbg('⚠ '+m,'#ffb84f');}
const _ce=console.error.bind(console);console.error=(...a)=>{_ce(...a);dbgErr(a.join(' '));};
const _cw=console.warn.bind(console);console.warn=(...a)=>{_cw(...a);dbgWarn(a.join(' '));};

// ── STATE ────────────────────────────────────────────────────
const state = {
  cx:.5,cy:.5,sx:.5,sy:.5,handVisible:false,
  hoveredTile:null,dwellStart:null,dwellProgress:0,
  lastSoundTime:0,micStream:null,audioCtx:null,analyser:null,
  screen:'home',
  scrollY:0,scrollTarget:0,
  videos:[],thumbCache:{},
};

// ── DOM ──────────────────────────────────────────────────────
const permScreen=document.getElementById('permission-screen');
const startBtn=document.getElementById('start-btn');
const statusBar=document.getElementById('status-bar');
const mainDiv=document.getElementById('main');
const canvas=document.getElementById('ui-canvas');
const ctx=canvas.getContext('2d');
const camVideo=document.getElementById('cam-video');
const camPreview=document.getElementById('cam-preview');
const prevCanvas=document.getElementById('preview-canvas');
const prevCtx=prevCanvas.getContext('2d');
const loadDiv=document.getElementById('loading');
const loadMsg=document.getElementById('load-msg');
const soundFlash=document.getElementById('sound-flash');
const camDot=document.getElementById('cam-dot');
const handDot=document.getElementById('hand-dot');
const micDot=document.getElementById('mic-dot');
const micBtn=document.getElementById('mic-btn');
const previewBtn=document.getElementById('preview-btn');
const videoOverlay=document.getElementById('video-overlay');
const fullVideo=document.getElementById('full-video');
const closeVideoBtn=document.getElementById('close-video');

// ── VIDEO LIBRARY ────────────────────────────────────────────
const COLORS=['#7c6aff','#ff6a9e','#ffa86a','#4fffb0','#6afffa','#ff9f43','#a29bfe','#fd79a8','#55efc4','#fdcb6e'];

async function loadVideoLibrary() {
  try {
    const r = await fetch('videos/index.json');
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const list = await r.json();
    state.videos = list.map((v,i)=>({
      id:'vid_'+i,
      name: v.name || v.file.replace(/\.[^.]+$/,'').replace(/[-_]/g,' '),
      src:'videos/'+v.file,
      color:COLORS[i%COLORS.length],
    }));
    dbgOk(`${state.videos.length} videos loaded`);
    state.videos.forEach(v=>generateThumb(v));
  } catch(e) {
    dbgWarn('videos/index.json not found – using placeholders. '+e.message);
    state.videos=Array.from({length:6},(_,i)=>({
      id:'vid_'+i, name:`Video ${i+1}`, src:null, color:COLORS[i],
    }));
  }
}

async function generateThumb(video) {
  if (!video.src) return;
  try {
    const v=document.createElement('video');
    v.src=video.src; v.muted=true; v.playsInline=true; v.preload='metadata';
    await new Promise((res,rej)=>{v.onloadedmetadata=res;v.onerror=rej;v.load();});
    v.currentTime=Math.min(3,v.duration*.1);
    await new Promise(res=>{v.onseeked=res;});
    const c=document.createElement('canvas');
    c.width=320;c.height=180;
    c.getContext('2d').drawImage(v,0,0,320,180);
    const blob=await new Promise(res=>c.toBlob(res,'image/jpeg',.7));
    state.thumbCache[video.src]=await createImageBitmap(blob);
    dbgOk('Thumb: '+video.name);
  } catch(e){dbgWarn('Thumb fail: '+video.name);}
}

// ── TILE LAYOUT ──────────────────────────────────────────────
function getHomeTiles() {
  const W=canvas.width,pad=CFG.tilePad,cols=CFG.cols;
  const tW=(W-pad*(cols+1))/cols, tH=CFG.tileH;
  const tiles=state.videos.map((v,i)=>{
    const col=i%cols,row=Math.floor(i/cols);
    return {id:v.id,label:v.name,color:v.color,action:'video',src:v.src,
      x:pad+col*(tW+pad), y:pad+row*(tH+pad)-state.scrollY, w:tW,h:tH};
  });
  const settingsRow=Math.ceil(state.videos.length/cols);
  tiles.push({id:'settings',label:'⚙️ Settings',color:'#9988cc',action:'settings',src:null,
    x:pad, y:pad+settingsRow*(tH+pad)-state.scrollY, w:W-pad*2, h:68});
  return tiles;
}

function getSettingsTiles() {
  const W=canvas.width,pad=CFG.tilePad,tW=(W-pad*3)/2,tH=88;
  return [
    {id:'dwell+',label:`⏱ Dwell +  (${(CFG.dwellMs/1000).toFixed(1)}s)`,x:pad,y:pad,w:tW,h:tH,action:'dwell+',color:'#7c6aff'},
    {id:'dwell-',label:`⏱ Dwell −  (${(CFG.dwellMs/1000).toFixed(1)}s)`,x:pad*2+tW,y:pad,w:tW,h:tH,action:'dwell-',color:'#7c6aff'},
    {id:'sens+', label:`🎯 Sensitivity + (${CFG.sensitivity.toFixed(1)})`,x:pad,y:pad*2+tH,w:tW,h:tH,action:'sens+',color:'#ff6a9e'},
    {id:'sens-', label:`🎯 Sensitivity − (${CFG.sensitivity.toFixed(1)})`,x:pad*2+tW,y:pad*2+tH,w:tW,h:tH,action:'sens-',color:'#ff6a9e'},
    {id:'mic',   label:CFG.micOn?'🎤 Mic: ON':'🎤 Mic: OFF',x:pad,y:pad*3+tH*2,w:tW,h:tH,action:'mic',color:'#4fffb0'},
    {id:'preview',label:CFG.previewOn?'📷 Preview: ON':'📷 Preview: OFF',x:pad*2+tW,y:pad*3+tH*2,w:tW,h:tH,action:'preview',color:'#6afffa'},
    {id:'back',  label:'← Back',x:pad,y:pad*4+tH*3,w:W-pad*2,h:tH,action:'back',color:'#aaaacc'},
  ];
}

function maxScroll() {
  const pad=CFG.tilePad,rows=Math.ceil((state.videos.length+1)/CFG.cols);
  const total=rows*(CFG.tileH+pad)+pad+68+pad;
  return Math.max(0,total-canvas.height);
}

// ── RENDER ────────────────────────────────────────────────────
function resize() {
  canvas.width=mainDiv.offsetWidth;
  canvas.height=mainDiv.offsetHeight;
  prevCanvas.width=170; prevCanvas.height=128;
}

function rr(x,y,w,h,r){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}

function render(ts) {
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#0a0a12'; ctx.fillRect(0,0,W,H);

  // grid
  ctx.strokeStyle='rgba(124,106,255,.035)'; ctx.lineWidth=1;
  for(let x=0;x<W;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=60){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  const tiles=state.screen==='settings'?getSettingsTiles():getHomeTiles();

  // scroll gradient hints
  if (state.screen==='home') {
    if (state.scrollY>0) {
      const gg=ctx.createLinearGradient(0,0,0,50);
      gg.addColorStop(0,'rgba(124,106,255,.25)'); gg.addColorStop(1,'rgba(124,106,255,0)');
      ctx.fillStyle=gg; ctx.fillRect(0,0,W,50);
      drawArrow(W/2,22,'up');
    }
    if (state.scrollY<maxScroll()) {
      const gg=ctx.createLinearGradient(0,H-50,0,H);
      gg.addColorStop(0,'rgba(124,106,255,0)'); gg.addColorStop(1,'rgba(124,106,255,.25)');
      ctx.fillStyle=gg; ctx.fillRect(0,H-50,W,50);
      drawArrow(W/2,H-22,'down');
    }
  }

  // tiles
  for (const tile of tiles) {
    if (tile.y+tile.h<0||tile.y>H) continue;
    const hov=state.hoveredTile===tile.id;

    if(hov){ctx.save();ctx.shadowColor=tile.color;ctx.shadowBlur=28;ctx.fillStyle=tile.color+'15';rr(tile.x,tile.y,tile.w,tile.h,16);ctx.fill();ctx.restore();}

    ctx.save();
    const g=ctx.createLinearGradient(tile.x,tile.y,tile.x+tile.w,tile.y+tile.h);
    g.addColorStop(0,hov?'#21213a':'#13132a'); g.addColorStop(1,hov?'#191930':'#0d0d1e');
    ctx.fillStyle=g; rr(tile.x,tile.y,tile.w,tile.h,16); ctx.fill();
    ctx.strokeStyle=hov?tile.color+'aa':'rgba(255,255,255,.07)'; ctx.lineWidth=hov?2.5:1.5;
    rr(tile.x,tile.y,tile.w,tile.h,16); ctx.stroke();
    ctx.restore();

    // thumbnail
    const vid=state.videos.find(v=>v.id===tile.id);
    if(vid&&state.thumbCache[vid.src]){
      ctx.save();
      rr(tile.x,tile.y,tile.w,tile.h,16); ctx.clip();
      const tb=state.thumbCache[vid.src];
      const sc=Math.max(tile.w/tb.width,tile.h/tb.height);
      const dw=tb.width*sc,dh=tb.height*sc;
      ctx.globalAlpha=0.5;
      ctx.drawImage(tb,tile.x+(tile.w-dw)/2,tile.y+(tile.h-dh)/2,dw,dh);
      ctx.globalAlpha=1;
      const ov=ctx.createLinearGradient(tile.x,tile.y,tile.x,tile.y+tile.h);
      ov.addColorStop(0,'rgba(10,10,18,.05)'); ov.addColorStop(1,'rgba(10,10,18,.78)');
      ctx.fillStyle=ov; ctx.fillRect(tile.x,tile.y,tile.w,tile.h);
      ctx.restore();
    }

    // label — truncated with ellipsis, anchored to bottom of tile
    ctx.save();
    const fs=Math.min(tile.w/9,22);
    ctx.fillStyle=hov?'#fff':'#c8c0f0';
    ctx.font=`${hov?700:600} ${fs}px 'Segoe UI',system-ui,sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowColor='rgba(0,0,0,.9)'; ctx.shadowBlur=10;
    const maxLabelW=tile.w-20;
    let label=tile.label;
    while(label.length>3&&ctx.measureText(label).width>maxLabelW) label=label.slice(0,-1);
    if(label!==tile.label) label=label.slice(0,-1)+'…';
    ctx.fillText(label,tile.x+tile.w/2,tile.y+tile.h-fs-8);
    ctx.restore();

    // dwell ring
    if(hov&&state.dwellProgress>0){
      const rx=tile.x+tile.w-24,ry=tile.y+24,rr2=15;
      ctx.save();
      ctx.strokeStyle='rgba(255,255,255,.12)'; ctx.lineWidth=4;
      ctx.beginPath(); ctx.arc(rx,ry,rr2,0,Math.PI*2); ctx.stroke();
      ctx.strokeStyle='#4fffb0'; ctx.lineWidth=4; ctx.lineCap='round';
      ctx.shadowColor='#4fffb0'; ctx.shadowBlur=8;
      ctx.beginPath(); ctx.arc(rx,ry,rr2,-Math.PI/2,-Math.PI/2+Math.PI*2*state.dwellProgress); ctx.stroke();
      ctx.restore();
    }
  }

  // scroll zone glow under cursor
  if(state.screen==='home'){
    const cy2=state.sy*H,zone=H*CFG.scrollZone;
    if(cy2<zone&&state.scrollY>0){
      ctx.save(); ctx.globalAlpha=.12; ctx.fillStyle='#7c6aff'; ctx.fillRect(0,0,W,zone); ctx.restore();
    }
    if(cy2>H-zone&&state.scrollY<maxScroll()){
      ctx.save(); ctx.globalAlpha=.12; ctx.fillStyle='#7c6aff'; ctx.fillRect(0,H-zone,W,zone); ctx.restore();
    }
  }

  // cursor
  const cx2=state.sx*W,cy2=state.sy*H,R=CFG.cursorRadius;
  if(state.handVisible){
    ctx.save();
    ctx.shadowColor='#7c6aff'; ctx.shadowBlur=32;
    ctx.beginPath(); ctx.arc(cx2,cy2,R,0,Math.PI*2);
    ctx.strokeStyle='rgba(124,106,255,.6)'; ctx.lineWidth=3; ctx.stroke();
    const cg=ctx.createRadialGradient(cx2-R*.3,cy2-R*.3,0,cx2,cy2,R);
    cg.addColorStop(0,'rgba(160,140,255,.85)'); cg.addColorStop(1,'rgba(100,80,220,.4)');
    ctx.fillStyle=cg; ctx.beginPath(); ctx.arc(cx2,cy2,R*.6,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(cx2,cy2,5,0,Math.PI*2); ctx.fill();
    ctx.restore();
  } else {
    ctx.save(); ctx.strokeStyle='rgba(124,106,255,.18)'; ctx.lineWidth=2; ctx.setLineDash([5,5]);
    ctx.beginPath(); ctx.arc(cx2,cy2,R,0,Math.PI*2); ctx.stroke(); ctx.restore();
  }

  if(!state.handVisible){
    ctx.save(); ctx.fillStyle='rgba(120,112,170,.42)';
    ctx.font='500 17px Segoe UI,system-ui,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='bottom';
    ctx.fillText('✋ Show your right hand to the camera',W/2,H-14);
    ctx.restore();
  }

  if(CFG.previewOn&&camVideo.readyState>=2){
    prevCtx.save(); prevCtx.scale(-1,1);
    prevCtx.drawImage(camVideo,-170,0,170,128);
    prevCtx.restore();
  }

  updateScroll();
  updateDwell(ts,tiles);
  requestAnimationFrame(render);
}

function drawArrow(x,y,dir){
  ctx.save(); ctx.fillStyle='rgba(124,106,255,.55)';
  ctx.beginPath();
  if(dir==='up'){ctx.moveTo(x,y-10);ctx.lineTo(x+18,y+8);ctx.lineTo(x-18,y+8);}
  else{ctx.moveTo(x,y+10);ctx.lineTo(x+18,y-8);ctx.lineTo(x-18,y-8);}
  ctx.closePath(); ctx.fill(); ctx.restore();
}

// ── SCROLL ───────────────────────────────────────────────────
function updateScroll(){
  if(state.screen!=='home') return;
  const H=canvas.height,cy2=state.sy*H,zone=H*CFG.scrollZone;
  if(cy2<zone&&state.handVisible) state.scrollTarget=Math.max(0,state.scrollTarget-CFG.scrollSpeed);
  else if(cy2>H-zone&&state.handVisible) state.scrollTarget=Math.min(maxScroll(),state.scrollTarget+CFG.scrollSpeed);
  state.scrollY+=(state.scrollTarget-state.scrollY)*.12;
  if(Math.abs(state.scrollTarget-state.scrollY)<.5) state.scrollY=state.scrollTarget;
}

// ── DWELL ─────────────────────────────────────────────────────
function updateDwell(ts,tiles){
  const W=canvas.width,H=canvas.height,curX=state.sx*W,curY=state.sy*H;
  const zone=H*CFG.scrollZone;
  if(curY<zone||curY>H-zone){state.hoveredTile=null;state.dwellStart=null;state.dwellProgress=0;return;}
  let hit=null;
  for(const t of tiles){
    if(t.y+t.h<0||t.y>H) continue;
    if(curX>=t.x&&curX<=t.x+t.w&&curY>=t.y&&curY<=t.y+t.h){hit=t;break;}
  }
  if(hit&&state.handVisible){
    if(state.hoveredTile!==hit.id){state.hoveredTile=hit.id;state.dwellStart=ts;state.dwellProgress=0;}
    else{
      state.dwellProgress=Math.min((ts-state.dwellStart)/CFG.dwellMs,1);
      if(state.dwellProgress>=1){selectTile(hit);state.dwellStart=ts+1000;state.dwellProgress=0;}
    }
  } else {state.hoveredTile=null;state.dwellStart=null;state.dwellProgress=0;}
}

// ── SELECT ────────────────────────────────────────────────────
function selectTile(tile){
  soundFlash.style.background=tile.color+'22'; soundFlash.style.opacity='1';
  setTimeout(()=>soundFlash.style.opacity='0',200);
  if(tile.action==='back')    {state.screen='home';return;}
  if(tile.action==='settings'){state.screen='settings';return;}
  if(tile.action==='video')   {playVideo(tile.src,tile.label);return;}
  if(tile.action==='dwell+')  {CFG.dwellMs=Math.min(4000,CFG.dwellMs+250);return;}
  if(tile.action==='dwell-')  {CFG.dwellMs=Math.max(500,CFG.dwellMs-250);return;}
  if(tile.action==='sens+')   {CFG.sensitivity=Math.min(4,+(CFG.sensitivity+.2).toFixed(1));return;}
  if(tile.action==='sens-')   {CFG.sensitivity=Math.max(.5,+(CFG.sensitivity-.2).toFixed(1));return;}
  if(tile.action==='mic')     {toggleMic();return;}
  if(tile.action==='preview') {togglePreview();return;}
}

// ── VIDEO PLAYER ──────────────────────────────────────────────
function playVideo(src,name){
  if(!src){flashMsg(`No file for "${name}" yet`);return;}
  // Reset cleanly before setting new src
  fullVideo.pause();
  fullVideo.removeAttribute('src');
  fullVideo.load();
  fullVideo.src=src;
  videoOverlay.classList.add('show');
  // Autoplay as soon as enough is loaded
  fullVideo.addEventListener('canplay', function handler(){
    fullVideo.removeEventListener('canplay',handler);
    fullVideo.play().catch(e=>dbgErr('Play: '+e.message));
  });
  // Fullscreen
  const el=videoOverlay;
  if(el.requestFullscreen) el.requestFullscreen().catch(()=>{});
  else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
}

function closeVideoPlayer(){
  fullVideo.pause();
  fullVideo.removeAttribute('src');
  fullVideo.load();
  videoOverlay.classList.remove('show');
  if(document.fullscreenElement) document.exitFullscreen().catch(()=>{});
  else if(document.webkitFullscreenElement) document.webkitExitFullscreen();
  dbgOk('Video closed, returning to tiles');
}
fullVideo.addEventListener('ended', closeVideoPlayer);
closeVideoBtn.addEventListener('click', closeVideoPlayer);

// ── MEDIAPIPE ─────────────────────────────────────────────────
let mpHands=null;
async function initHandTracking(){
  loadMsg.textContent='Loading hand tracker…'; dbg('Loading MediaPipe…');
  mpHands=new Hands({locateFile:f=>`https://unpkg.com/@mediapipe/hands@0.4.1646424915/${f}`});
  mpHands.setOptions({maxNumHands:1,modelComplexity:0,minDetectionConfidence:.6,minTrackingConfidence:.5});
  mpHands.onResults(onHandResults);
  try{await mpHands.initialize();dbgOk('MediaPipe ready');}
  catch(e){dbgErr('MP fail: '+e.message);loadDiv.classList.add('gone');enableMouseFallback();return;}
  loadMsg.textContent='Starting camera…';
  await startCamera();
}

function onHandResults(results){
  if(results.multiHandLandmarks&&results.multiHandLandmarks.length>0){
    const lm=results.multiHandLandmarks[0];
    const px=(lm[0].x+lm[9].x)/2,py=(lm[0].y+lm[9].y)/2;
    if(!state.handVisible) dbgOk(`Hand (${px.toFixed(2)},${py.toFixed(2)})`);
    state.cx=.5-(px-.5)*CFG.sensitivity;
    state.cy=.5+(py-.5)*CFG.sensitivity;
    state.handVisible=true;
    handDot.className='sdot ok';
    document.getElementById('hand-lbl').textContent='Hand ✓';
  } else {
    state.handVisible=false;
    handDot.className='sdot warn';
    document.getElementById('hand-lbl').textContent='Hand…';
  }
  state.sx+=(state.cx-state.sx)*CFG.smoothing;
  state.sy+=(state.cy-state.sy)*CFG.smoothing;
  state.sx=Math.max(.02,Math.min(.98,state.sx));
  state.sy=Math.max(.02,Math.min(.98,state.sy));
}

async function startCamera(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:640},height:{ideal:480}},audio:false});
    camVideo.srcObject=stream;
    await new Promise(res=>camVideo.onloadedmetadata=res);
    camVideo.play(); dbgOk('Camera on');
    camDot.className='sdot ok';
    document.getElementById('cam-lbl').textContent='Camera ✓';
    (async function frameLoop(){if(camVideo.readyState>=2&&mpHands)await mpHands.send({image:camVideo});requestAnimationFrame(frameLoop);})();
    dbgOk('Frame loop running');
    loadDiv.classList.add('gone');
  }catch(e){
    dbgErr('Camera: '+e.name+' – '+e.message);
    loadMsg.textContent='Camera denied – mouse fallback';
    setTimeout(()=>loadDiv.classList.add('gone'),2000);
    enableMouseFallback();
  }
}

function enableMouseFallback(){
  canvas.addEventListener('mousemove',e=>{
    const r=canvas.getBoundingClientRect();
    state.cx=state.sx=(e.clientX-r.left)/r.width;
    state.cy=state.sy=(e.clientY-r.top)/r.height;
    state.handVisible=true;
  });
  handDot.className='sdot ok';
  document.getElementById('hand-lbl').textContent='Mouse';
}

// ── MIC ───────────────────────────────────────────────────────
async function toggleMic(){
  if(!CFG.micOn){
    try{
      const s=await navigator.mediaDevices.getUserMedia({audio:true});
      state.audioCtx=new(window.AudioContext||window.webkitAudioContext)();
      state.analyser=state.audioCtx.createAnalyser(); state.analyser.fftSize=256;
      state.audioCtx.createMediaStreamSource(s).connect(state.analyser);
      state.micStream=s; CFG.micOn=true;
      micDot.className='sdot ok'; micBtn.classList.add('on'); micBtn.textContent='🎤 ON';
      startSoundLoop();
    }catch(e){flashMsg('Mic denied');}
  } else {
    state.micStream?.getTracks().forEach(t=>t.stop());
    state.audioCtx?.close(); state.analyser=null; CFG.micOn=false;
    micDot.className='sdot'; micBtn.classList.remove('on'); micBtn.textContent='🎤 Mic';
  }
}
function startSoundLoop(){
  const buf=new Float32Array(128);
  (function loop(){
    if(!CFG.micOn||!state.analyser) return;
    state.analyser.getFloatTimeDomainData(buf);
    let rms=0;for(const v of buf)rms+=v*v;rms=Math.sqrt(rms/buf.length);
    if(rms>CFG.soundThreshold){const now=performance.now();if(now-state.lastSoundTime>CFG.soundCooldownMs){state.lastSoundTime=now;onSound();}}
    requestAnimationFrame(loop);
  })();
}
function onSound(){
  soundFlash.style.background='rgba(79,255,176,.15)'; soundFlash.style.opacity='1';
  setTimeout(()=>soundFlash.style.opacity='0',150);
  if(state.hoveredTile){
    const tiles=state.screen==='settings'?getSettingsTiles():getHomeTiles();
    const t=tiles.find(t=>t.id===state.hoveredTile);
    if(t) selectTile(t);
  }
}

// ── PREVIEW ───────────────────────────────────────────────────
function togglePreview(){
  CFG.previewOn=!CFG.previewOn;
  camPreview.classList.toggle('show',CFG.previewOn);
  previewBtn.classList.toggle('on',CFG.previewOn);
}

// ── FLASH MSG ─────────────────────────────────────────────────
function flashMsg(msg){
  const el=document.createElement('div');
  el.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(124,106,255,.92);color:#fff;padding:13px 30px;border-radius:40px;font-size:1.1rem;font-weight:700;z-index:300;pointer-events:none;white-space:nowrap;animation:fadeUp .3s ease forwards;';
  el.textContent=msg; document.body.appendChild(el); setTimeout(()=>el.remove(),2200);
}

// ── START ─────────────────────────────────────────────────────
startBtn.addEventListener('click',async()=>{
  permScreen.style.display='none';
  statusBar.classList.add('show');
  mainDiv.classList.add('show');
  resize(); window.addEventListener('resize',resize);
  dbgOk('App started');
  await loadVideoLibrary();
  requestAnimationFrame(render);
  await initHandTracking();
});
micBtn.addEventListener('click',toggleMic);
previewBtn.addEventListener('click',togglePreview);
document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();onSound();}});
</script>

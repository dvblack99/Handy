<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HandCam">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0d1a">
<link rel="manifest" href="manifest.json">
<title>HandCam</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#0d0d1a; --surface:#16162a; --accent:#6c63ff; --accent2:#ff6584;
  --green:#00e5a0; --yellow:#ffd166; --text:#ffffff; --text2:#c8c4f0;
  --muted:#7870aa; --tile-border:rgba(255,255,255,.1);
}
html,body { width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:'Segoe UI',system-ui,sans-serif;-webkit-user-select:none;user-select:none; }

/* ── SCREENS ─────────────────────────────────────────────── */
.screen { position:fixed;inset:0;display:none;flex-direction:column;
align-items:center;justify-content:center; }
.screen.active { display:flex; }

/* ── PERMISSION ──────────────────────────────────────────── */
#perm-screen { background:var(–bg);z-index:100;gap:24px;padding:40px;text-align:center; }
#perm-screen h1 { font-size:clamp(2.8rem,11vw,5.5rem);font-weight:900;
background:linear-gradient(135deg,#a89cff,#ff6584);-webkit-background-clip:text;
-webkit-text-fill-color:transparent; }
#perm-screen p  { font-size:clamp(1rem,3.5vw,1.4rem);color:var(–text2);max-width:480px; }
#perm-btn { padding:18px 48px;font-size:clamp(1.1rem,4vw,1.5rem);font-weight:700;
background:linear-gradient(135deg,var(–accent),var(–accent2));border:none;
border-radius:50px;color:#fff;cursor:pointer;box-shadow:0 0 40px rgba(108,99,255,.5);
transition:transform .15s,box-shadow .15s; }
#perm-btn:active { transform:scale(.96); }

/* ── CAMERA BACKGROUND ───────────────────────────────────── */
#cam-bg { position:fixed;inset:0;z-index:0; }
#cam-video { position:absolute;inset:0;width:100%;height:100%;
object-fit:cover;transform:scaleX(-1); }

/* ── MENU SCREEN ─────────────────────────────────────────── */
#menu-screen { background:rgba(13,13,26,.7);backdrop-filter:blur(4px);z-index:10; }
.menu-grid { display:grid;grid-template-columns:1fr 1fr;gap:20px;
padding:24px;width:100%;max-width:600px; }
.menu-tile {
aspect-ratio:1;display:flex;flex-direction:column;align-items:center;
justify-content:center;gap:10px;border-radius:24px;cursor:pointer;
border:2px solid var(–tile-border);background:rgba(22,22,42,.85);
transition:transform .15s,box-shadow .15s;position:relative;overflow:hidden;
}
.menu-tile::before { content:’’;position:absolute;inset:0;opacity:0;
background:radial-gradient(circle at 50% 50%,rgba(255,255,255,.15),transparent 70%);
transition:opacity .2s; }
.menu-tile:active::before { opacity:1; }
.menu-tile .tile-icon { font-size:clamp(2.4rem,9vw,4rem); }
.menu-tile .tile-label { font-size:clamp(.85rem,3vw,1.15rem);font-weight:700;
color:var(–text2);letter-spacing:.04em;text-transform:uppercase; }
.tile-videos  { border-color:rgba(255,101,132,.4); }
.tile-music   { border-color:rgba(255,209,102,.4); }
.tile-games   { border-color:rgba(0,229,160,.4); }
.tile-other   { border-color:rgba(108,99,255,.4); }

/* ── BACK / X BUTTON ─────────────────────────────────────── */
/* Universal X — same on every sub-screen and game */
.x-btn {
position:fixed;top:20px;left:20px;z-index:99999;
width:clamp(72px,18vw,110px);height:clamp(72px,18vw,110px);
border-radius:50%;background:rgba(255,255,255,.18);border:3px solid rgba(255,255,255,.5);
display:flex;align-items:center;justify-content:center;
font-size:clamp(2rem,7vw,3.5rem);color:#fff;cursor:pointer;
transition:background .2s;backdrop-filter:blur(6px);
/* Always above canvas */
isolation:isolate;
}
.x-btn.dwell-active { background:rgba(255,100,132,.6); }
.dwell-ring {
position:absolute;inset:-4px;border-radius:50%;
border:4px solid transparent;border-top-color:var(–accent2);
animation:none;pointer-events:none;
}
@keyframes dwell-spin { to { transform:rotate(360deg); } }

/* ── SUB-SCREEN WRAPPER ──────────────────────────────────── */
#sub-screen { background:rgba(13,13,26,.75);backdrop-filter:blur(3px);z-index:10; }
#sub-title { position:fixed;top:24px;left:50%;transform:translateX(-50%);
font-size:clamp(1.1rem,4vw,1.6rem);font-weight:800;letter-spacing:.08em;
text-transform:uppercase;color:var(–text2);z-index:10;pointer-events:none; }
.sub-grid { display:grid;grid-template-columns:1fr 1fr;gap:20px;
padding:24px;padding-top:90px;width:100%;max-width:600px;overflow-y:auto;
max-height:100vh; }

/* ── VIDEO PLAYER ────────────────────────────────────────── */
#video-player { background:#000;z-index:20; }
#player-vid { width:100%;height:100%;object-fit:contain; }
#video-loading { position:fixed;bottom:0;left:0;right:0;height:5px;
background:rgba(255,255,255,.1);z-index:30; }
#video-loading-bar { height:100%;width:0;background:var(–accent);
transition:width .2s; }

/* ── BALLZ GAME ──────────────────────────────────────────── */
#ballz-screen { background:transparent;z-index:15; }
#ballz-canvas { position:fixed;inset:0;width:100%;height:100%;z-index:15;pointer-events:none; }

/* ── DWELL CURSOR ────────────────────────────────────────── */
#dwell-cursor {
position:fixed;width:54px;height:54px;border-radius:50%;
border:3px solid rgba(255,255,255,.7);pointer-events:none;z-index:9998;
transform:translate(-50%,-50%);transition:opacity .2s;opacity:0;
background:rgba(255,255,255,.08);
}
#dwell-cursor.visible { opacity:1; }
#dwell-cursor-fill {
position:absolute;inset:3px;border-radius:50%;
background:conic-gradient(var(–accent2) 0%, transparent 0%);
transition:background .05s;
}
</style>

</head>
<body>

<!-- DWELL CURSOR -->

<div id="dwell-cursor"><div id="dwell-cursor-fill"></div></div>

<!-- PERMISSION SCREEN -->

<div id="perm-screen" class="screen active">
  <h1>👋 HandCam</h1>
  <p>Control everything with your hands and body — no touching required.</p>
  <button id="perm-btn" onclick="startCamera()">Enable Camera</button>
</div>

<!-- CAMERA BACKGROUND (always running after permission) -->

<div id="cam-bg" style="display:none">
  <video id="cam-video" autoplay playsinline muted></video>
</div>

<!-- MENU SCREEN -->

<div id="menu-screen" class="screen">
  <div class="menu-grid">
    <div class="menu-tile tile-videos" onclick="openSection('videos')">
      <span class="tile-icon">🎬</span>
      <span class="tile-label">Videos</span>
    </div>
    <div class="menu-tile tile-music" onclick="openSection('music')">
      <span class="tile-icon">🎵</span>
      <span class="tile-label">Music</span>
    </div>
    <div class="menu-tile tile-games" onclick="openSection('games')">
      <span class="tile-icon">🎮</span>
      <span class="tile-label">Games</span>
    </div>
    <div class="menu-tile tile-other" onclick="openSection('other')">
      <span class="tile-icon">⭐</span>
      <span class="tile-label">Other</span>
    </div>
  </div>
</div>

<!-- SUB-SCREEN (Videos/Music/Games/Other listings) -->

<div id="sub-screen" class="screen">
  <div id="sub-title"></div>
  <div class="sub-grid" id="sub-grid"></div>
</div>

<!-- VIDEO PLAYER -->

<div id="video-player" class="screen">
  <video id="player-vid" playsinline autoplay></video>
  <div id="video-loading"><div id="video-loading-bar"></div></div>
</div>

<!-- BALLZ GAME -->

<div id="ballz-screen" class="screen">
  <canvas id="ballz-canvas"></canvas>
</div>

<!-- MediaPipe Pose -->

<script src="https://unpkg.com/@mediapipe/pose@0.5.1675469404/pose.js" crossorigin="anonymous"></script>

<script src="https://unpkg.com/@mediapipe/camera_utils@0.3.1632090399/camera_utils.js" crossorigin="anonymous"></script>

<script>
// ═══════════════════════════════════════════════════════════
//  GLOBALS
// ═══════════════════════════════════════════════════════════
let audioUnlocked = false;
let camStream     = null;
let mpCamera      = null;
let mpPose        = null;
let poseResults   = null;

// Navigation stack for back/X button
const navStack = [];
function currentScreen() { return navStack[navStack.length-1] || 'menu'; }

// ═══════════════════════════════════════════════════════════
//  SCREEN MANAGEMENT
// ═══════════════════════════════════════════════════════════
function showScreen(id, pushToStack=true) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  // Remove any lingering X buttons
  document.querySelectorAll('.x-btn').forEach(b => b.remove());

  if (id !== 'perm-screen' && id !== 'menu-screen') {
    if (pushToStack) navStack.push(id);
    addXButton();
  }
}

function goBack() {
  navStack.pop();
  const prev = navStack[navStack.length-1];
  if (!prev || prev === 'menu-screen') {
    navStack.length = 0;
    stopBallz();
    stopVideo();
    showScreen('menu-screen', false);
  } else {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(prev).classList.add('active');
    document.querySelectorAll('.x-btn').forEach(b => b.remove());
    if (prev !== 'menu-screen') addXButton();
  }
}

function addXButton() {
  const btn = document.createElement('div');
  btn.className = 'x-btn';
  btn.id = 'x-btn';
  btn.innerHTML = `✕<div class="dwell-ring" id="x-dwell-ring"></div>`;
  btn.onclick = goBack;
  document.body.appendChild(btn);
  setupXDwell(btn);
}

// ═══════════════════════════════════════════════════════════
//  DWELL: X BUTTON (hand hover to exit)
// ═══════════════════════════════════════════════════════════
let xDwellTimer = null;
let xDwellStart = null;
const DWELL_MS  = 1200;

function setupXDwell(btn) {
  // Called from pose tracking when hand is over the X
}

function triggerXDwell(hovering) {
  const btn = document.getElementById('x-btn');
  if (!btn) return;
  const ring = document.getElementById('x-dwell-ring');
  if (hovering) {
    if (!xDwellStart) {
      xDwellStart = Date.now();
      btn.classList.add('dwell-active');
      if (ring) ring.style.animation = `dwell-spin ${DWELL_MS}ms linear forwards`;
      xDwellTimer = setTimeout(() => {
        xDwellStart = null;
        btn.classList.remove('dwell-active');
        if (ring) ring.style.animation = 'none';
        goBack();
      }, DWELL_MS);
    }
  } else {
    if (xDwellTimer) clearTimeout(xDwellTimer);
    xDwellTimer = null;
    xDwellStart = null;
    if (btn) btn.classList.remove('dwell-active');
    if (ring) ring.style.animation = 'none';
  }
}

// ═══════════════════════════════════════════════════════════
//  CAMERA + AUDIO UNLOCK
// ═══════════════════════════════════════════════════════════
async function startCamera() {
  // ── Unlock audio AND video playback in this synchronous user-gesture frame ──
  unlockAudio();
  // Pre-warm the player video element with a silent blob so iOS marks it
  // as "user-gesture activated" — then real src swaps work with audio on.
  prewarmVideoElement();

  try {
    camStream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:'user', width:{ideal:1280}, height:{ideal:720} },
      audio:false
    });
    const vid = document.getElementById('cam-video');
    vid.srcObject = camStream;
    document.getElementById('cam-bg').style.display = 'block';

    showScreen('menu-screen', false);
    navStack.length = 0;

    initPose();

  } catch(e) {
    alert('Camera permission denied. Please allow camera access and reload.');
  }
}

function unlockAudio() {
  if (audioUnlocked) return;
  audioUnlocked = true;
  try {
    const ac = new (window.AudioContext || window.webkitAudioContext)();
    const buf = ac.createBuffer(1,1,22050);
    const src = ac.createBufferSource();
    src.buffer = buf;
    src.connect(ac.destination);
    src.start(0);
    ac.resume().then(() => ac.close());
  } catch(e) {}
}

function prewarmVideoElement() {
  // Call .play() synchronously inside the gesture — iOS tags this element
  // as allowed to play with audio for the session lifetime.
  const vid = document.getElementById('player-vid');
  try {
    vid.muted = false;
    vid.volume = 1.0;
    // A tiny silent data URI so play() has something to chew on
    vid.src = 'data:video/mp4;base64,AAAAIGZ0eXBpc29tAAACAGlzb21pc28yYXZjMW1wNDEAAAAIZnJlZQAAAAhtZGF0';
    const p = vid.play();
    if (p) p.catch(()=>{});
    // Immediately pause and clear — we just needed the gesture binding
    setTimeout(() => { vid.pause(); vid.src = ''; vid.load(); }, 100);
  } catch(e) {}
}

// ═══════════════════════════════════════════════════════════
//  NAVIGATION: sections
// ═══════════════════════════════════════════════════════════
const SECTIONS = {
  videos: {
    label: 'Videos 🎬',
    items: []  // populated dynamically from server
  },
  music: {
    label: 'Music 🎵',
    items: [
      { icon:'🎹', label:'Piano',  action:()=>comingSoon('Piano') },
      { icon:'🎸', label:'Guitar', action:()=>comingSoon('Guitar') },
      { icon:'🥁', label:'Drums',  action:()=>comingSoon('Drums') },
    ]
  },
  games: {
    label: 'Games 🎮',
    items: [
      { icon:'👗', label:'Dress Up',  action:()=>comingSoon('Dress Up') },
      { icon:'🏀', label:'Ballz!',    action:()=>startBallz() },
      { icon:'🏹', label:'Catapult',  action:()=>comingSoon('Catapult') },
    ]
  },
  other: {
    label: 'Other ⭐',
    items: [
      { icon:'⚙️', label:'Settings', action:()=>comingSoon('Settings') },
    ]
  }
};

function comingSoon(name) {
  alert(name + ' — coming soon!');
}

async function openSection(key) {
  const sec = SECTIONS[key];
  document.getElementById('sub-title').textContent = sec.label;
  const grid = document.getElementById('sub-grid');
  grid.innerHTML = '';

  if (key === 'videos') {
    // Load video list from server
    await loadVideoTiles(grid);
  } else {
    sec.items.forEach(item => {
      const tile = makeTile(item.icon, item.label, item.action);
      grid.appendChild(tile);
    });
  }

  showScreen('sub-screen');
}

function makeTile(icon, label, action) {
  const d = document.createElement('div');
  d.className = 'menu-tile';
  d.innerHTML = `<span class="tile-icon">${icon}</span><span class="tile-label">${label}</span>`;
  d.onclick = action;
  return d;
}

// ═══════════════════════════════════════════════════════════
//  VIDEO LOADING
// ═══════════════════════════════════════════════════════════
async function loadVideoTiles(grid) {
  try {
    const res = await fetch('/handy/api/videos.php');
    const videos = await res.json();
    if (!videos.length) {
      grid.innerHTML = '<p style="color:var(--muted);padding:20px">No videos yet.</p>';
      return;
    }
    videos.forEach(v => {
      const tile = makeTile('▶️', v.title || v.filename, () => playVideo(v.url));
      grid.appendChild(tile);
    });
  } catch(e) {
    // Fallback tiles for testing
    grid.innerHTML = '<p style="color:var(--muted);padding:20px;grid-column:span 2">Could not load videos.</p>';
  }
}

function playVideo(url) {
  const vid = document.getElementById('player-vid');
  const bar = document.getElementById('video-loading-bar');
  const loadBar = document.getElementById('video-loading');

  // Reset
  vid.pause();
  vid.src = '';
  bar.style.width = '0%';
  loadBar.style.display = 'block';

  showScreen('video-player');

  vid.src = url;
  vid.muted = false;   // Audio on — iOS allows this after our unlockAudio gesture
  vid.volume = 1.0;

  vid.onprogress = () => {
    if (vid.buffered.length) {
      const pct = (vid.buffered.end(0) / vid.duration) * 100;
      bar.style.width = pct + '%';
      if (pct >= 99) loadBar.style.display = 'none';
    }
  };
  vid.oncanplay = () => {
    loadBar.style.display = 'none';
    // Play with audio — this works because camera permission was a prior user gesture
    const p = vid.play();
    if (p && p.catch) p.catch(() => {
      // If still blocked, mute and play (silent fallback)
      vid.muted = true;
      vid.play();
    });
  };
  vid.load();
}

function stopVideo() {
  const vid = document.getElementById('player-vid');
  vid.pause();
  vid.src = '';
}

// ═══════════════════════════════════════════════════════════
//  MEDIAPIPE POSE
// ═══════════════════════════════════════════════════════════
function initPose() {
  mpPose = new Pose({
    locateFile:(f) => `https://unpkg.com/@mediapipe/pose@0.5.1675469404/${f}`
  });
  mpPose.setOptions({
    modelComplexity:1,
    smoothLandmarks:true,
    enableSegmentation:false,
    minDetectionConfidence:0.5,
    minTrackingConfidence:0.5
  });
  mpPose.onResults(onPoseResults);

  mpCamera = new Camera(document.getElementById('cam-video'), {
    onFrame: async () => {
      if (mpPose) await mpPose.send({ image: document.getElementById('cam-video') });
    },
    width:1280, height:720
  });
  mpCamera.start();
}

function onPoseResults(results) {
  poseResults = results;
  // Check hand dwell over X button
  checkHandOverX(results);
}

function checkHandOverX(results) {
  const btn = document.getElementById('x-btn');
  if (!btn || !results.poseLandmarks) { triggerXDwell(false); return; }

  const r = btn.getBoundingClientRect();
  const cx = r.left + r.width/2;
  const cy = r.top  + r.height/2;
  const sw = window.innerWidth, sh = window.innerHeight;

  // Check wrist landmarks (15=left wrist, 16=right wrist)
  const wrists = [15,16];
  let hovering = false;
  for (const idx of wrists) {
    const lm = results.poseLandmarks[idx];
    if (!lm) continue;
    // Mirror X because cam is mirrored
    const lx = (1 - lm.x) * sw;
    const ly = lm.y * sh;
    const dist = Math.hypot(lx - cx, ly - cy);
    if (dist < r.width * 0.75) { hovering = true; break; }
  }
  triggerXDwell(hovering);
}

// ═══════════════════════════════════════════════════════════
//  BALLZ! GAME
// ═══════════════════════════════════════════════════════════
const ballzCanvas = document.getElementById('ballz-canvas');
const bctx = ballzCanvas.getContext('2d');
let ballzRunning = false;
let ballzRaf = null;

let posePoints   = [];
let prevPosePts  = [];
let poseDetected = false;

const BALL_COLORS = ['#ff6584','#ffd166','#06d6a0','#4ecdc4','#6c63ff','#ff9f43','#a29bfe'];
const MAX_BALLS   = 5;

// Pose skeleton segments for collision (pairs of landmark indices)
const BODY_SEGS = [
  [11,12],[11,13],[13,15],[12,14],[14,16], // arms
  [11,23],[12,24],[23,24],                 // torso
  [23,25],[25,27],[24,26],[26,28],         // legs
  [27,29],[28,30],[29,31],[30,32],         // ankles/feet
];
// Radius per segment index (thicker for torso, normal for limbs)
const SEG_RADIUS = (a,b) => {
  const torso = new Set([11,12,23,24]);
  if (torso.has(a) && torso.has(b)) return 38;
  return 22;
};

let balls = [];
let audioCtx = null;

function ensureAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
}

function playBounce(freq=220, vol=0.25) {
  try {
    ensureAudioCtx();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type='sine'; o.frequency.setValueAtTime(freq, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(freq*0.5, audioCtx.currentTime+0.12);
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+0.2);
    o.start(); o.stop(audioCtx.currentTime+0.22);
  } catch(e){}
}

function spawnBall() {
  const r = window.innerWidth * 0.045 + Math.random()*window.innerWidth*0.02;
  return {
    x: r + Math.random()*(window.innerWidth - 2*r),
    y: -r*2,
    vx: (Math.random()-0.5)*4,
    vy: 2 + Math.random()*2,
    r,
    color: BALL_COLORS[Math.floor(Math.random()*BALL_COLORS.length)],
    trail: []
  };
}

function startBallz() {
  showScreen('ballz-screen');
  ballzCanvas.width  = window.innerWidth;
  ballzCanvas.height = window.innerHeight;
  balls = [];
  for (let i=0;i<3;i++) balls.push(spawnBall());
  ballzRunning = true;
  ballzLoop();
}

function stopBallz() {
  ballzRunning = false;
  if (ballzRaf) { cancelAnimationFrame(ballzRaf); ballzRaf=null; }
  bctx.clearRect(0,0,ballzCanvas.width,ballzCanvas.height);
}

function mpToCanvas(lm) {
  const vw = window.innerWidth, vh = window.innerHeight;
  const vidAspect = 16/9;
  const scrAspect = vw/vh;
  let sx,sy,sw,sh;
  if (scrAspect > vidAspect) {
    sw = vw; sh = vw/vidAspect;
    sx = 0;  sy = (vh-sh)/2;
  } else {
    sh = vh; sw = vh*vidAspect;
    sy = 0;  sx = (vw-sw)/2;
  }
  // Mirror X
  return { x:(1-lm.x)*sw + sx, y:lm.y*sh + sy };
}

function updatePosePoints() {
  prevPosePts = posePoints.map(p=>({...p}));
  if (!poseResults || !poseResults.poseLandmarks) { poseDetected=false; return; }
  poseDetected = true;
  posePoints = poseResults.poseLandmarks.map((lm,i) => {
    const c = mpToCanvas(lm);
    const prev = prevPosePts[i] || c;
    return { x:c.x, y:c.y, vx:c.x-prev.x, vy:c.y-prev.y };
  });
}

function drawBodyOutline() {
  if (!poseDetected || posePoints.length < 33) return;
  // Draw thick glow segments
  for (const [a,b] of BODY_SEGS) {
    if (!posePoints[a]||!posePoints[b]) continue;
    const pa=posePoints[a], pb=posePoints[b];
    const r = SEG_RADIUS(a,b);
    // Glow
    bctx.save();
    bctx.strokeStyle='rgba(108,99,255,0.35)';
    bctx.lineWidth=r*2+10;
    bctx.lineCap='round';
    bctx.shadowColor='#6c63ff';
    bctx.shadowBlur=18;
    bctx.beginPath();
    bctx.moveTo(pa.x,pa.y);
    bctx.lineTo(pb.x,pb.y);
    bctx.stroke();
    // Core
    bctx.strokeStyle='rgba(180,170,255,0.55)';
    bctx.lineWidth=r*2;
    bctx.shadowBlur=0;
    bctx.stroke();
    bctx.restore();
  }
  // Head
  const nose = posePoints[0];
  if (nose) {
    const ls=posePoints[11],rs=posePoints[12];
    const headR = ls&&rs ? Math.hypot(ls.x-rs.x,ls.y-rs.y)*0.28 : 36;
    bctx.save();
    bctx.beginPath();
    bctx.arc(nose.x,nose.y,headR,0,Math.PI*2);
    bctx.fillStyle='rgba(108,99,255,0.22)';
    bctx.shadowColor='#6c63ff';
    bctx.shadowBlur=16;
    bctx.fill();
    bctx.strokeStyle='rgba(180,170,255,0.5)';
    bctx.lineWidth=3;
    bctx.stroke();
    bctx.restore();
  }
}

function collideBallBody(ball) {
  if (!poseDetected) return;
  const W=window.innerWidth, H=window.innerHeight;

  // Head collision
  const nose=posePoints[0];
  if (nose) {
    const ls=posePoints[11],rs=posePoints[12];
    const hr = ls&&rs ? Math.hypot(ls.x-rs.x,ls.y-rs.y)*0.28 : 36;
    const bodyR = hr + ball.r;
    const dx=ball.x-nose.x, dy=ball.y-nose.y;
    const dist=Math.hypot(dx,dy);
    if (dist<bodyR && dist>0) {
      const nx=dx/dist, ny=dy/dist;
      const dot=ball.vx*nx+ball.vy*ny;
      const bvx=nose.vx||0, bvy=nose.vy||0;
      const bDot=bvx*nx+bvy*ny;
      const impulse=Math.max(0, -(dot-bDot)*1.5);
      ball.vx+=nx*impulse; ball.vy+=ny*impulse;
      ball.x=nose.x+nx*(bodyR+1); ball.y=nose.y+ny*(bodyR+1);
      playBounce(300+Math.random()*200);
    }
  }

  // Segment collisions
  for (const [a,b] of BODY_SEGS) {
    const pa=posePoints[a],pb=posePoints[b];
    if (!pa||!pb) continue;
    const segR = SEG_RADIUS(a,b) + ball.r;
    // Closest point on segment to ball
    const ABx=pb.x-pa.x,ABy=pb.y-pa.y;
    const t=Math.max(0,Math.min(1,((ball.x-pa.x)*ABx+(ball.y-pa.y)*ABy)/(ABx*ABx+ABy*ABy+1e-9)));
    const cx=pa.x+t*ABx, cy=pa.y+t*ABy;
    const dx=ball.x-cx, dy=ball.y-cy;
    const dist=Math.hypot(dx,dy);
    if (dist<segR && dist>0) {
      const nx=dx/dist, ny=dy/dist;
      const dot=ball.vx*nx+ball.vy*ny;
      const bvx=(pa.vx+pb.vx)*0.5||0, bvy=(pa.vy+pb.vy)*0.5||0;
      const bDot=bvx*nx+bvy*ny;
      const impulse=Math.max(0,-(dot-bDot)*1.4);
      ball.vx+=nx*impulse; ball.vy+=ny*impulse;
      ball.x=cx+nx*(segR+1); ball.y=cy+ny*(segR+1);
      playBounce(180+Math.random()*160, 0.18);
    }
  }
}

function collideBallBall() {
  for (let i=0;i<balls.length;i++) {
    for (let j=i+1;j<balls.length;j++) {
      const a=balls[i], b=balls[j];
      const dx=b.x-a.x, dy=b.y-a.y;
      const dist=Math.hypot(dx,dy);
      const minD=a.r+b.r;
      if (dist<minD && dist>0) {
        const nx=dx/dist, ny=dy/dist;
        const dvx=a.vx-b.vx, dvy=a.vy-b.vy;
        const dot=dvx*nx+dvy*ny;
        if (dot>0) {
          a.vx-=dot*nx; a.vy-=dot*ny;
          b.vx+=dot*nx; b.vy+=dot*ny;
        }
        const overlap=(minD-dist)/2;
        a.x-=nx*overlap; a.y-=ny*overlap;
        b.x+=nx*overlap; b.y+=ny*overlap;
        playBounce(400+Math.random()*200, 0.12);
      }
    }
  }
}

function ballzLoop() {
  if (!ballzRunning) return;
  ballzRaf = requestAnimationFrame(ballzLoop);

  ballzCanvas.width  = window.innerWidth;
  ballzCanvas.height = window.innerHeight;
  bctx.clearRect(0,0,ballzCanvas.width,ballzCanvas.height);

  updatePosePoints();
  drawBodyOutline();

  const W=window.innerWidth, H=window.innerHeight;
  const GRAVITY=0.25, DAMPEN=0.72;

  // Spawn new balls if needed
  while(balls.length < MAX_BALLS) {
    if (Math.random()<0.008) balls.push(spawnBall());
    else break;
  }

  for (const ball of balls) {
    ball.vy += GRAVITY;
    ball.x  += ball.vx;
    ball.y  += ball.vy;

    // Trail
    ball.trail.push({x:ball.x,y:ball.y});
    if (ball.trail.length>8) ball.trail.shift();

    // Walls
    if (ball.x-ball.r<0)  { ball.x=ball.r;  ball.vx=Math.abs(ball.vx)*DAMPEN+0.5; playBounce(250,0.15); }
    if (ball.x+ball.r>W)  { ball.x=W-ball.r; ball.vx=-Math.abs(ball.vx)*DAMPEN-0.5; playBounce(250,0.15); }
    if (ball.y+ball.r>H)  { ball.y=H-ball.r; ball.vy=-Math.abs(ball.vy)*DAMPEN-0.5; playBounce(200,0.15); }
    if (ball.y-ball.r<0)  { ball.y=ball.r;   ball.vy=Math.abs(ball.vy)*DAMPEN+0.5; playBounce(200,0.15); }

    // Speed cap
    const spd=Math.hypot(ball.vx,ball.vy);
    if (spd>28) { ball.vx=ball.vx/spd*28; ball.vy=ball.vy/spd*28; }

    collideBallBody(ball);
  }

  collideBallBall();

  // Draw trails + balls
  for (const ball of balls) {
    // Trail
    for (let i=0;i<ball.trail.length;i++) {
      const alpha=(i/ball.trail.length)*0.3;
      const sz=ball.r*(i/ball.trail.length)*0.6;
      bctx.beginPath();
      bctx.arc(ball.trail[i].x,ball.trail[i].y,sz,0,Math.PI*2);
      bctx.fillStyle=ball.color.replace(')',`,${alpha})`).replace('#','rgba(').replace(/([0-9a-f]{2})/gi,h=>parseInt(h,16)+',').replace(/,$/,'');
      bctx.fill();
    }
    // Glow
    bctx.save();
    bctx.shadowColor=ball.color;
    bctx.shadowBlur=18;
    bctx.beginPath();
    bctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
    const grad=bctx.createRadialGradient(ball.x-ball.r*.3,ball.y-ball.r*.3,ball.r*.1,ball.x,ball.y,ball.r);
    grad.addColorStop(0,'rgba(255,255,255,0.7)');
    grad.addColorStop(0.3,ball.color);
    grad.addColorStop(1,ball.color+'99');
    bctx.fillStyle=grad;
    bctx.fill();
    bctx.restore();
  }
}

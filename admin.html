<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HandCam Admin</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root { --bg:#0a0a12; --surface:#14142a; --accent:#7c6aff; --green:#4fffb0; --red:#ff6a6a; --text:#f0eeff; --muted:#7870aa; }
body { background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,sans-serif; min-height:100vh; padding:24px; }

h1 { font-size:1.8rem; font-weight:900; margin-bottom:4px; }
.subtitle { color:var(–muted); font-size:.9rem; margin-bottom:28px; }

.card { background:var(–surface); border:1px solid rgba(255,255,255,.07); border-radius:16px; padding:24px; margin-bottom:20px; }
.card h2 { font-size:1.1rem; font-weight:700; margin-bottom:16px; color:var(–text); }

/* Drop zone */
#drop-zone {
border:2px dashed rgba(124,106,255,.4); border-radius:12px;
padding:40px 20px; text-align:center; cursor:pointer;
transition:all .2s; margin-bottom:16px;
}
#drop-zone:hover, #drop-zone.drag-over {
border-color:var(–accent); background:rgba(124,106,255,.08);
}
#drop-zone .icon { font-size:3rem; margin-bottom:12px; }
#drop-zone p { color:var(–muted); font-size:.95rem; }
#drop-zone strong { color:var(–text); }
#file-input { display:none; }

/* Upload queue */
#queue { display:flex; flex-direction:column; gap:10px; }
.queue-item {
background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.06);
border-radius:10px; padding:12px 16px;
}
.qi-header { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.qi-name { flex:1; font-size:.9rem; font-weight:600; word-break:break-all; }
.qi-size { color:var(–muted); font-size:.8rem; flex-shrink:0; }
.qi-status { font-size:.8rem; flex-shrink:0; }
.qi-name-edit {
width:100%; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.12);
border-radius:8px; padding:6px 10px; color:var(–text); font-size:.85rem;
margin-bottom:8px;
}
.progress-bar { height:4px; background:rgba(255,255,255,.1); border-radius:2px; overflow:hidden; }
.progress-fill { height:100%; background:var(–accent); border-radius:2px; width:0%; transition:width .3s; }
.progress-fill.done { background:var(–green); }
.progress-fill.err  { background:var(–red); }

#upload-all-btn {
width:100%; padding:14px; background:var(–accent); color:#fff;
border:none; border-radius:12px; font-size:1rem; font-weight:700;
cursor:pointer; margin-top:8px; transition:opacity .2s;
}
#upload-all-btn:disabled { opacity:.4; cursor:not-allowed; }

/* Video list */
#video-list { display:flex; flex-direction:column; gap:8px; }
.vl-item {
display:flex; align-items:center; gap:12px;
background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.06);
border-radius:10px; padding:10px 14px;
}
.vl-thumb { width:80px; height:45px; border-radius:6px; object-fit:cover; background:#111; flex-shrink:0; }
.vl-info { flex:1; min-width:0; }
.vl-name { font-size:.9rem; font-weight:600; }
.vl-file { font-size:.75rem; color:var(–muted); margin-top:2px; word-break:break-all; }
.vl-del {
background:none; border:1px solid rgba(255,100,100,.3); color:var(–red);
padding:5px 10px; border-radius:8px; cursor:pointer; font-size:.8rem;
flex-shrink:0; transition:all .2s;
}
.vl-del:hover { background:rgba(255,100,100,.1); }
.vl-empty { color:var(–muted); font-size:.9rem; text-align:center; padding:20px; }

/* Alerts */
.alert { padding:12px 16px; border-radius:10px; margin-bottom:12px; font-size:.9rem; }
.alert.ok  { background:rgba(79,255,176,.12); border:1px solid rgba(79,255,176,.3); color:var(–green); }
.alert.err { background:rgba(255,106,106,.12); border:1px solid rgba(255,106,106,.3); color:var(–red); }

a.back-link { color:var(–accent); text-decoration:none; font-size:.9rem; display:inline-block; margin-bottom:20px; }
a.back-link:hover { text-decoration:underline; }
</style>

</head>
<body>

<a href="./" class="back-link">← Back to HandCam</a>

<h1>📁 HandCam Admin</h1>
<p class="subtitle">Upload and manage videos for the hand controller</p>

<div id="alert-area"></div>

<!-- UPLOAD CARD -->

<div class="card">
  <h2>Upload Videos</h2>
  <div id="drop-zone">
    <div class="icon">🎬</div>
    <p><strong>Tap to choose videos</strong><br>or drag and drop here</p>
    <input type="file" id="file-input" accept="video/*" multiple>
  </div>
  <div id="queue"></div>
  <button id="upload-all-btn" disabled>Upload All</button>
</div>

<!-- VIDEO LIBRARY CARD -->

<div class="card">
  <h2>Video Library <button id="refresh-btn" style="background:none;border:1px solid rgba(255,255,255,.15);color:var(--muted);padding:3px 10px;border-radius:8px;cursor:pointer;font-size:.75rem;margin-left:8px">↻ Refresh</button></h2>
  <div id="video-list"><div class="vl-empty">Loading…</div></div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────
// Upload endpoint — matches the PHP script at upload.php
const UPLOAD_URL = 'upload.php';
const INDEX_URL  = 'videos/index.json';

// ── STATE ─────────────────────────────────────────────────────
let queue = []; // {file, displayName, status, progress}

// ── DROP ZONE ─────────────────────────────────────────────────
const dropZone  = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const queueEl   = document.getElementById('queue');
const uploadBtn = document.getElementById('upload-all-btn');

dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => addFiles(Array.from(e.target.files)));

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag-over');
  addFiles(Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('video/')));
});

function addFiles(files) {
  files.forEach(f => {
    const item = {
      file: f,
      displayName: f.name.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' '),
      status: 'pending',
      progress: 0,
      id: Date.now() + Math.random(),
    };
    queue.push(item);
    renderQueueItem(item);
  });
  uploadBtn.disabled = queue.filter(i => i.status === 'pending').length === 0;
}

function renderQueueItem(item) {
  const el = document.createElement('div');
  el.className = 'queue-item';
  el.id = 'qi-' + item.id;
  el.innerHTML = `
    <div class="qi-header">
      <span class="qi-name">${item.file.name}</span>
      <span class="qi-size">${(item.file.size/1024/1024).toFixed(1)} MB</span>
      <span class="qi-status" id="qs-${item.id}">⏳ Pending</span>
    </div>
    <input class="qi-name-edit" type="text" value="${item.displayName}" placeholder="Display name…" id="qn-${item.id}">
    <div class="progress-bar"><div class="progress-fill" id="qp-${item.id}"></div></div>
  `;
  queueEl.appendChild(el);
  document.getElementById('qn-' + item.id).addEventListener('input', e => { item.displayName = e.target.value; });
}

// ── UPLOAD ────────────────────────────────────────────────────
uploadBtn.addEventListener('click', async () => {
  uploadBtn.disabled = true;
  const pending = queue.filter(i => i.status === 'pending');
  for (const item of pending) {
    await uploadItem(item);
  }
  await refreshLibrary();
  showAlert('All uploads complete!', 'ok');
});

function uploadItem(item) {
  return new Promise((resolve) => {
    item.status = 'uploading';
    document.getElementById('qs-' + item.id).textContent = '⬆️ Uploading…';

    const fd = new FormData();
    fd.append('video', item.file);
    fd.append('name', item.displayName);

    const xhr = new XMLHttpRequest();
    xhr.open('POST', UPLOAD_URL);

    xhr.upload.onprogress = e => {
      if (e.lengthComputable) {
        item.progress = e.loaded / e.total;
        const pct = Math.round(item.progress * 100);
        const bar = document.getElementById('qp-' + item.id);
        if (bar) { bar.style.width = pct + '%'; }
        document.getElementById('qs-' + item.id).textContent = `⬆️ ${pct}%`;
      }
    };

    xhr.onload = () => {
      const bar = document.getElementById('qp-' + item.id);
      const statusEl = document.getElementById('qs-' + item.id);
      if (xhr.status === 200) {
        item.status = 'done';
        if (bar) { bar.style.width = '100%'; bar.classList.add('done'); }
        if (statusEl) statusEl.textContent = '✅ Done';
      } else {
        item.status = 'error';
        if (bar) bar.classList.add('err');
        if (statusEl) statusEl.textContent = '❌ Failed';
        showAlert('Upload failed: ' + xhr.responseText, 'err');
      }
      resolve();
    };

    xhr.onerror = () => {
      item.status = 'error';
      const statusEl = document.getElementById('qs-' + item.id);
      if (statusEl) statusEl.textContent = '❌ Error';
      showAlert('Network error uploading ' + item.file.name, 'err');
      resolve();
    };

    xhr.send(fd);
  });
}

// ── LIBRARY ───────────────────────────────────────────────────
document.getElementById('refresh-btn').addEventListener('click', refreshLibrary);

async function refreshLibrary() {
  const listEl = document.getElementById('video-list');
  try {
    const r = await fetch(INDEX_URL + '?t=' + Date.now());
    if (!r.ok) throw new Error('No library yet');
    const videos = await r.json();
    if (!videos.length) { listEl.innerHTML = '<div class="vl-empty">No videos uploaded yet.</div>'; return; }
    listEl.innerHTML = '';
    videos.forEach(v => {
      const el = document.createElement('div');
      el.className = 'vl-item';
      el.innerHTML = `
        <video class="vl-thumb" src="videos/${v.file}#t=2" muted preload="metadata"></video>
        <div class="vl-info">
          <div class="vl-name">${v.name}</div>
          <div class="vl-file">${v.file}</div>
        </div>
        <button class="vl-del" data-file="${v.file}">🗑 Delete</button>
      `;
      listEl.appendChild(el);
    });
    listEl.querySelectorAll('.vl-del').forEach(btn => {
      btn.addEventListener('click', () => deleteVideo(btn.dataset.file));
    });
  } catch(e) {
    listEl.innerHTML = '<div class="vl-empty">No videos uploaded yet.</div>';
  }
}

async function deleteVideo(filename) {
  if (!confirm(`Delete "${filename}"?`)) return;
  try {
    const r = await fetch(UPLOAD_URL, {
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:'action=delete&file='+encodeURIComponent(filename),
    });
    if (r.ok) { showAlert('Deleted: ' + filename, 'ok'); await refreshLibrary(); }
    else showAlert('Delete failed', 'err');
  } catch(e) { showAlert('Error: '+e.message, 'err'); }
}

// ── ALERTS ────────────────────────────────────────────────────
function showAlert(msg, type) {
  const el = document.createElement('div');
  el.className = 'alert ' + type;
  el.textContent = msg;
  const area = document.getElementById('alert-area');
  area.appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

// ── INIT ──────────────────────────────────────────────────────
refreshLibrary();
</script>

</body>
</html>
